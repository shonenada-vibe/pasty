name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: swift build -c release

      - name: Create .app bundle
        run: |
          APP_DIR="Pasty.app/Contents"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"

          cp .build/release/Pasty "$APP_DIR/MacOS/Pasty"

          VERSION="${{ steps.version.outputs.VERSION }}"

          cat > "$APP_DIR/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.pasty.app</string>
              <key>CFBundleExecutable</key>
              <string>Pasty</string>
              <key>CFBundleName</key>
              <string>Pasty</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>LSUIElement</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          EOF

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - Pasty.app

      - name: Create zip archive
        run: |
          ditto -c -k --sequesterRsrc --keepParent Pasty.app "Pasty-${{ steps.version.outputs.VERSION }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pasty ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: Pasty-${{ steps.version.outputs.VERSION }}.zip
